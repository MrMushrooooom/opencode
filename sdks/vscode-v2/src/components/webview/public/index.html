<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCode Assistant</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #1e1e1e;
            color: #cccccc;
            overflow: hidden;
        }
        
        #root {
            height: 100vh;
            width: 100vw;
        }
        
        /* Loading spinner */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1e1e1e;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #3e3e42;
            border-top: 4px solid #1890ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 16px;
            color: #888888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-container">
            <div>
                <div class="loading-spinner"></div>
                <div class="loading-text">Loading OpenCode Assistant...</div>
            </div>
        </div>
    </div>
    
    <script>
        console.log('🐛 Frontend: Script starting...');
        
        // VSCode API integration
        const vscode = acquireVsCodeApi();
        
        // Make VSCode API available globally
        window.acquireVsCodeApi = () => vscode;
        
        // Handle messages from VSCode extension
        window.addEventListener('message', (event) => {
            const message = event.data;
            
            // Forward messages to React app if it's loaded
            if (window.reactApp && window.reactApp.handleMessage) {
                window.reactApp.handleMessage(message);
            }
        });
        
        // Expose VSCode API for React app
        window.vscodeAPI = vscode;
        
        // Add error handling
        window.addEventListener('error', function(event) {
            console.error('🐛 Frontend: JavaScript Error:', event.error);
            vscode.postMessage({
                type: 'debug',
                message: `🐛 Frontend: JavaScript Error: ${event.error?.message || 'Unknown error'}`
            });
        });
        
        window.addEventListener('unhandledrejection', function(event) {
            console.error('🐛 Frontend: Unhandled Promise Rejection:', event.reason);
            vscode.postMessage({
                type: 'debug',
                message: `🐛 Frontend: Unhandled Promise Rejection: ${event.reason}`
            });
        });
        
        console.log('🐛 Frontend: Basic script loaded successfully');
        vscode.postMessage({
            type: 'debug',
            message: '🐛 Frontend: Basic script loaded successfully'
        });
    </script>
</body>
</html>
